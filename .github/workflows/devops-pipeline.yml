name: Deploy to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build the containers and send them to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: adiruhil/my-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: adiruhil/my-frontend:latest

  # Job 2: This is the 'Deploy' stage you want to see
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # This ensures deploy only starts if build succeeds
    steps:
      - name: Simulate Deployment
        run: |
          echo "Connecting to Production Server..."
          echo "Pulling latest images from Docker Hub..."
          echo "Restarting Docker Compose services..."
          echo "Deployment Successful!"