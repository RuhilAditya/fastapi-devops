<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>DevOps Control Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-4px);
            border-color: #60a5fa;
            box-shadow: 0 20px 25px -5px rgba(96, 165, 250, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .status-healthy {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .pulse-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #64748b;
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.2);
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <!-- Navigation Bar -->
        <nav class="backdrop-blur-md bg-slate-900/50 border-b border-slate-700/50 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-tachometer-alt text-white"></i>
                        </div>
                        <h1 class="text-2xl font-bold gradient-text">DevOps Hub</h1>
                    </div>
                    <div id="api-status" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/50 border border-slate-600/50 backdrop-blur-sm">
                        <span class="pulse-indicator inline-block w-2 h-2 bg-emerald-400 rounded-full"></span>
                        <span class="text-sm font-mono text-slate-300">Checking...</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <!-- Header Section -->
            <div class="mb-12">
                <h2 class="text-4xl font-bold text-white mb-2">Dashboard</h2>
                <p class="text-slate-400">Monitor and manage your microservices in real-time</p>
            </div>

            <!-- Add Service Form -->
            <div class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 backdrop-blur-md p-8 rounded-2xl border border-slate-700/50 shadow-xl mb-12">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fas fa-plus-circle text-blue-400 text-2xl"></i>
                    <h3 class="text-xl font-semibold text-white">Register New Service</h3>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input 
                        id="nameInput" 
                        type="text" 
                        placeholder="Service Name" 
                        class="input-focus bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-400"
                    >
                    <input 
                        id="statusInput" 
                        type="text" 
                        placeholder="Status (e.g., running, stopped)" 
                        class="input-focus bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-400"
                    >
                    <button 
                        onclick="addService()" 
                        class="btn-primary text-white px-6 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all"
                    >
                        <i class="fas fa-paper-plane"></i>
                        Add Service
                    </button>
                </div>
            </div>

            <!-- Services Grid -->
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
                    <i class="fas fa-server text-blue-400"></i>
                    Active Services
                </h3>
                <div id="service-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-slate-800/30 border border-slate-700 rounded-xl p-6 flex items-center justify-center min-h-32">
                        <div class="text-center">
                            <i class="fas fa-spinner text-blue-400 text-2xl animate-spin mb-2"></i>
                            <p class="text-slate-400">Loading services...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gradient-to-br from-blue-900/20 to-blue-800/20 backdrop-blur-md p-6 rounded-2xl border border-blue-700/30">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-400 text-sm font-medium mb-2">Total Services</p>
                            <p id="total-services" class="text-3xl font-bold text-white">0</p>
                        </div>
                        <i class="fas fa-cube text-4xl text-blue-400/30"></i>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-emerald-900/20 to-emerald-800/20 backdrop-blur-md p-6 rounded-2xl border border-emerald-700/30">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-400 text-sm font-medium mb-2">Healthy Services</p>
                            <p id="healthy-services" class="text-3xl font-bold text-emerald-400">0</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl text-emerald-400/30"></i>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-amber-900/20 to-amber-800/20 backdrop-blur-md p-6 rounded-2xl border border-amber-700/30">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-400 text-sm font-medium mb-2">Issues</p>
                            <p id="issue-count" class="text-3xl font-bold text-amber-400">0</p>
                        </div>
                        <i class="fas fa-exclamation-triangle text-4xl text-amber-400/30"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.1.15:8000';

        function getStatusClass(status) {
            const statusLower = status.toLowerCase();
            if (statusLower.includes('running') || statusLower.includes('healthy') || statusLower.includes('up')) {
                return 'status-healthy';
            } else if (statusLower.includes('warning') || statusLower.includes('restarting')) {
                return 'status-warning';
            } else {
                return 'status-error';
            }
        }

        function getStatusIcon(status) {
            const statusLower = status.toLowerCase();
            if (statusLower.includes('running') || statusLower.includes('healthy') || statusLower.includes('up')) {
                return 'fa-check-circle text-emerald-400';
            } else if (statusLower.includes('warning') || statusLower.includes('restarting')) {
                return 'fa-exclamation-circle text-amber-400';
            } else {
                return 'fa-times-circle text-red-400';
            }
        }

        async function fetchHealth() {
            try {
                const res = await fetch(`${API_URL}/`);
                const data = await res.json();
                const statusEl = document.getElementById('api-status');
                statusEl.innerHTML = `
                    <span class="pulse-indicator inline-block w-2 h-2 bg-emerald-400 rounded-full"></span>
                    <span class="text-sm font-mono text-emerald-400">● API Online v${data.version || '1.0'}</span>
                `;
            } catch {
                const statusEl = document.getElementById('api-status');
                statusEl.innerHTML = `
                    <span class="inline-block w-2 h-2 bg-red-400 rounded-full"></span>
                    <span class="text-sm font-mono text-red-400">● API Offline</span>
                `;
            }
        }

        async function loadServices() {
            try {
                const res = await fetch(`${API_URL}/services`);
                const data = await res.json();
                const container = document.getElementById('service-list');
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full bg-slate-800/30 border border-slate-700 rounded-xl p-8 text-center">
                            <i class="fas fa-inbox text-4xl text-slate-600 mb-4"></i>
                            <p class="text-slate-400">No services registered yet. Add one to get started.</p>
                        </div>
                    `;
                    updateStats(data);
                    return;
                }

                container.innerHTML = data.map(s => `
                    <div class="card-hover bg-gradient-to-br from-slate-800/40 to-slate-900/40 backdrop-blur-md p-6 rounded-2xl border border-slate-700/50 hover:border-blue-500/50 overflow-hidden group relative">
                        <div class="absolute inset-0 bg-gradient-to-r from-blue-500/0 via-blue-500/0 to-blue-500/0 group-hover:from-blue-500/5 group-hover:via-blue-500/10 group-hover:to-transparent transition-all duration-300 pointer-events-none"></div>
                        
                        <div class="relative z-10">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-2">
                                        <i class="fas fa-microchip text-blue-400 text-lg"></i>
                                        <h4 class="text-lg font-bold text-white">${s.name}</h4>
                                    </div>
                                    <span class="status-badge ${getStatusClass(s.status)}">
                                        <i class="fas ${getStatusIcon(s.status)} mr-1"></i>
                                        ${s.status}
                                    </span>
                                </div>
                            </div>
                            
                            <div class="pt-4 border-t border-slate-700/50">
                                <div class="flex items-center gap-2 text-xs text-slate-500">
                                    <i class="fas fa-clock"></i>
                                    <span>Updated now</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                updateStats(data);
            } catch (error) {
                const container = document.getElementById('service-list');
                container.innerHTML = `
                    <div class="col-span-full bg-red-900/20 border border-red-700/50 rounded-xl p-8 text-center">
                        <i class="fas fa-exclamation-circle text-4xl text-red-400 mb-4"></i>
                        <p class="text-red-400">Failed to load services. Please check the backend connection.</p>
                    </div>
                `;
            }
        }

        function updateStats(services) {
            const total = services.length;
            const healthy = services.filter(s => {
                const statusLower = s.status.toLowerCase();
                return statusLower.includes('running') || statusLower.includes('healthy') || statusLower.includes('up');
            }).length;
            const issues = total - healthy;

            document.getElementById('total-services').textContent = total;
            document.getElementById('healthy-services').textContent = healthy;
            document.getElementById('issue-count').textContent = issues;
        }

        async function addService() {
            const name = document.getElementById('nameInput').value.trim();
            const status = document.getElementById('statusInput').value.trim();

            if (!name || !status) {
                alert('Please fill in all fields');
                return;
            }

            try {
                await fetch(`${API_URL}/services`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, status})
                });
                document.getElementById('nameInput').value = '';
                document.getElementById('statusInput').value = '';
                loadServices();
            } catch (error) {
                alert('Failed to add service. Please check the backend connection.');
            }
        }

        // Initial load
        fetchHealth();
        loadServices();

        // Refresh every 30 seconds
        setInterval(() => {
            fetchHealth();
            loadServices();
        }, 30000);
    </script>
</body>
</html>
